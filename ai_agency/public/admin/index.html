<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>LeadGen AI — Admin Console</title>
<script src="https://cdn.tailwindcss.com"></script>
<style>
  body { font-family: ui-sans-serif, system-ui, -apple-system, "Segoe UI", sans-serif; }
</style>
</head>
<body class="bg-slate-950 text-slate-100 min-h-screen">

<div id="loading" class="p-10 text-sm text-slate-400">Checking session…</div>

<div id="console" class="hidden max-w-5xl mx-auto px-6 py-10">
  <header class="mb-8 flex items-center justify-between">
    <div>
      <h1 class="text-3xl font-extrabold tracking-tight bg-gradient-to-r from-sky-400 to-indigo-400 bg-clip-text text-transparent">Admin Console</h1>
      <p class="text-sm text-slate-400 mt-1">Create and manage workspaces (paying customers).</p>
    </div>
    <button id="logoutBtn" class="text-sm text-slate-400 hover:text-slate-200">Sign out</button>
  </header>

  <section class="bg-slate-900 border border-slate-800 rounded-2xl p-6 mb-6">
    <h2 class="text-lg font-bold mb-4">New workspace</h2>
    <div class="grid sm:grid-cols-3 gap-3">
      <input id="newWsName" placeholder="Workspace name (e.g. Acme Roofing)" class="bg-slate-950 border border-slate-700 focus:border-sky-500 rounded-lg p-3 text-sm sm:col-span-1">
      <input id="newWsEmail" type="email" placeholder="Owner's email" class="bg-slate-950 border border-slate-700 focus:border-sky-500 rounded-lg p-3 text-sm sm:col-span-1">
      <button id="createWsBtn" class="bg-sky-500 hover:bg-sky-400 text-slate-950 font-bold rounded-lg px-4 py-3 text-sm">Create + invite owner</button>
    </div>
    <p id="createResult" class="hidden mt-3 text-sm"></p>
  </section>

  <section class="bg-slate-900 border border-slate-800 rounded-2xl p-6 mb-6">
    <h2 class="text-lg font-bold mb-4">Workspaces</h2>
    <div id="wsList" class="space-y-3"></div>
  </section>

  <section class="bg-slate-900 border border-slate-800 rounded-2xl p-6">
    <h2 class="text-lg font-bold mb-2">Invite mailbox</h2>
    <p class="text-sm text-slate-400 mb-4">The mailbox every invite email is sent from — separate from any workspace's own sending domain, since a brand-new workspace has no SMTP configured yet.</p>
    <div class="grid sm:grid-cols-2 gap-3">
      <div>
        <label class="block text-xs text-slate-400 mb-1">Public base URL (this app's own URL)</label>
        <input id="mbBaseUrl" placeholder="https://app.example.com" class="w-full bg-slate-950 border border-slate-800 rounded p-2 text-sm font-mono">
      </div>
      <div>
        <label class="block text-xs text-slate-400 mb-1">From name</label>
        <input id="mbFromName" placeholder="LeadGen AI" class="w-full bg-slate-950 border border-slate-800 rounded p-2 text-sm font-mono">
      </div>
      <div>
        <label class="block text-xs text-slate-400 mb-1">From address</label>
        <input id="mbFromAddr" placeholder="invites@app.example.com" class="w-full bg-slate-950 border border-slate-800 rounded p-2 text-sm font-mono">
      </div>
      <div>
        <label class="block text-xs text-slate-400 mb-1">SMTP host</label>
        <input id="mbHost" placeholder="smtp.gmail.com" class="w-full bg-slate-950 border border-slate-800 rounded p-2 text-sm font-mono">
      </div>
      <div>
        <label class="block text-xs text-slate-400 mb-1">SMTP port</label>
        <input id="mbPort" placeholder="587" class="w-full bg-slate-950 border border-slate-800 rounded p-2 text-sm font-mono">
      </div>
      <div>
        <label class="block text-xs text-slate-400 mb-1">SMTP user</label>
        <input id="mbUser" class="w-full bg-slate-950 border border-slate-800 rounded p-2 text-sm font-mono">
      </div>
      <div>
        <label class="block text-xs text-slate-400 mb-1">SMTP password</label>
        <input id="mbPass" type="password" placeholder="(leave blank to keep current)" class="w-full bg-slate-950 border border-slate-800 rounded p-2 text-sm font-mono">
      </div>
    </div>
    <button id="saveMailboxBtn" class="mt-4 bg-sky-500 hover:bg-sky-400 text-slate-950 font-bold rounded-lg px-4 py-2 text-sm">Save mailbox settings</button>
    <p id="mbSaved" class="hidden mt-2 text-sm text-emerald-400">✓ saved</p>
  </section>
</div>

<script>
const $ = (id) => document.getElementById(id);

async function boot(){
  const r = await fetch('/api/admin/status');
  const j = await r.json();
  if(!j.data || !j.data.authed){
    window.location.href = '/admin/login.html';
    return;
  }
  $('loading').classList.add('hidden');
  $('console').classList.remove('hidden');
  await Promise.all([loadWorkspaces(), loadMailbox()]);
}

async function loadWorkspaces(){
  const r = await fetch('/api/admin/workspaces');
  const j = await r.json();
  const rows = j.data || [];
  $('wsList').innerHTML = rows.length ? rows.map(ws => `
    <div class="bg-slate-950 border border-slate-800 rounded-xl p-4 flex items-center justify-between gap-4">
      <div>
        <div class="font-semibold">${escapeHtml(ws.name)} <span class="text-xs text-slate-500">(${ws.user_count} user${ws.user_count===1?'':'s'})</span></div>
        <div class="text-xs text-slate-500">${ws.slug} · created ${ws.created_at.slice(0,10)}</div>
      </div>
      <div class="flex items-center gap-2">
        <span class="text-xs px-2 py-1 rounded-full ${ws.status==='active' ? 'bg-emerald-500/10 text-emerald-300' : 'bg-amber-500/10 text-amber-300'}">${ws.status}</span>
        ${ws.status === 'active'
          ? `<button data-action="suspend" data-id="${ws.id}" class="text-xs bg-slate-800 hover:bg-slate-700 rounded-lg px-3 py-2">Suspend</button>`
          : `<button data-action="resume" data-id="${ws.id}" class="text-xs bg-slate-800 hover:bg-slate-700 rounded-lg px-3 py-2">Resume</button>`}
      </div>
    </div>
  `).join('') : '<p class="text-sm text-slate-500">No workspaces yet — create the first one above.</p>';
}

function escapeHtml(s){
  const d = document.createElement('div'); d.textContent = s == null ? '' : String(s); return d.innerHTML;
}

$('wsList').addEventListener('click', async (e) => {
  const btn = e.target.closest('[data-action]');
  if(!btn) return;
  const action = btn.dataset.action, id = btn.dataset.id;
  btn.disabled = true;
  await fetch(`/api/admin/workspaces/${id}/${action}`, {method: 'POST', headers: {'Content-Type': 'application/json'}});
  await loadWorkspaces();
});

$('createWsBtn').addEventListener('click', async () => {
  const name = $('newWsName').value.trim();
  const owner_email = $('newWsEmail').value.trim();
  const resultEl = $('createResult');
  resultEl.classList.add('hidden');
  if(!name || !owner_email){
    resultEl.textContent = 'Enter both a workspace name and the owner\'s email.';
    resultEl.className = 'mt-3 text-sm text-red-400';
    resultEl.classList.remove('hidden');
    return;
  }
  const btn = $('createWsBtn');
  btn.disabled = true; btn.textContent = '…';
  try{
    const r = await fetch('/api/admin/workspaces', {method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({name, owner_email})});
    const j = await r.json();
    if(!j.ok){
      resultEl.textContent = j.error || 'Could not create workspace.';
      resultEl.className = 'mt-3 text-sm text-red-400';
    } else if(j.data.email_sent){
      resultEl.textContent = `✓ Workspace created and invite emailed to ${owner_email}.`;
      resultEl.className = 'mt-3 text-sm text-emerald-400';
      $('newWsName').value = ''; $('newWsEmail').value = '';
    } else {
      resultEl.textContent = j.data.invite_link
        ? `Workspace created. Invite email did NOT send (${j.data.email_error || 'mailbox not configured'}) — share this link manually: ${j.data.invite_link}`
        : `Workspace created, but no invite link could be built (${j.data.email_error || 'set the invite mailbox base URL below'}).`;
      resultEl.className = 'mt-3 text-sm text-amber-400 break-all';
      $('newWsName').value = ''; $('newWsEmail').value = '';
    }
    resultEl.classList.remove('hidden');
    await loadWorkspaces();
  } catch(e){
    resultEl.textContent = 'Network error — try again.';
    resultEl.className = 'mt-3 text-sm text-red-400';
    resultEl.classList.remove('hidden');
  } finally {
    btn.disabled = false; btn.textContent = 'Create + invite owner';
  }
});

async function loadMailbox(){
  const r = await fetch('/api/admin/settings/invite-mailbox');
  const j = await r.json();
  const mb = j.data || {};
  $('mbBaseUrl').value = mb.base_url || '';
  $('mbFromName').value = mb.from_name || '';
  $('mbFromAddr').value = mb.from_address || '';
  $('mbHost').value = mb.smtp_host || '';
  $('mbPort').value = mb.smtp_port || 587;
  $('mbUser').value = mb.smtp_user || '';
}

$('saveMailboxBtn').addEventListener('click', async () => {
  const body = {
    base_url: $('mbBaseUrl').value.trim(),
    from_name: $('mbFromName').value.trim(),
    from_address: $('mbFromAddr').value.trim(),
    smtp_host: $('mbHost').value.trim(),
    smtp_port: parseInt($('mbPort').value, 10) || 587,
    smtp_user: $('mbUser').value.trim(),
  };
  const pw = $('mbPass').value;
  if(pw) body.smtp_pass = pw;
  await fetch('/api/admin/settings/invite-mailbox', {method:'PUT', headers:{'Content-Type':'application/json'}, body: JSON.stringify(body)});
  $('mbPass').value = '';
  $('mbSaved').classList.remove('hidden');
  setTimeout(() => $('mbSaved').classList.add('hidden'), 2000);
});

$('logoutBtn').addEventListener('click', async () => {
  await fetch('/api/admin/logout', {method:'POST', headers:{'Content-Type':'application/json'}});
  window.location.href = '/admin/login.html';
});

boot();
</script>
</body>
</html>
