<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>LeadGen AI — Accept Invite</title>
<script src="https://cdn.tailwindcss.com"></script>
<style>
  body { font-family: ui-sans-serif, system-ui, -apple-system, "Segoe UI", sans-serif; }
</style>
</head>
<body class="bg-slate-950 text-slate-100 min-h-screen flex items-center justify-center px-6">

<div class="w-full max-w-md bg-slate-900 border border-slate-800 rounded-2xl p-8">
  <h1 class="text-2xl font-extrabold tracking-tight bg-gradient-to-r from-sky-400 to-indigo-400 bg-clip-text text-transparent mb-1">LeadGen AI</h1>

  <div id="loading" class="text-sm text-slate-400 mt-4">Checking your invite…</div>

  <div id="invalidState" class="hidden mt-4 space-y-3">
    <p class="text-sm text-red-400">This invite link is invalid or has expired.</p>
    <p class="text-sm text-slate-400">Ask whoever invited you to send a new one.</p>
  </div>

  <div id="formState" class="hidden mt-4 space-y-4">
    <p id="inviteContext" class="text-sm text-slate-400"></p>
    <div>
      <label class="block text-xs font-semibold text-slate-300 mb-1">Your name (optional)</label>
      <input id="nameInput" type="text" class="w-full bg-slate-950 border border-slate-700 focus:border-sky-500 rounded-lg p-3 text-sm">
    </div>
    <div>
      <label class="block text-xs font-semibold text-slate-300 mb-1">Password (min 8 characters)</label>
      <input id="pwInput" type="password" class="w-full bg-slate-950 border border-slate-700 focus:border-sky-500 rounded-lg p-3 text-sm">
    </div>
    <div>
      <label class="block text-xs font-semibold text-slate-300 mb-1">Confirm password</label>
      <input id="pw2Input" type="password" class="w-full bg-slate-950 border border-slate-700 focus:border-sky-500 rounded-lg p-3 text-sm">
    </div>
    <p id="formErr" class="hidden text-sm text-red-400"></p>
    <button id="submitBtn" class="w-full bg-sky-500 hover:bg-sky-400 text-slate-950 font-bold rounded-lg px-4 py-3 text-sm">Set password &amp; continue →</button>
  </div>
</div>

<script>
const $ = (id) => document.getElementById(id);
const params = new URLSearchParams(location.search);
const token = params.get('token') || '';

function show(id){
  ['loading','invalidState','formState'].forEach(x => $(x).classList.toggle('hidden', x !== id));
}

if(!token){
  show('invalidState');
} else {
  show('formState');
  $('inviteContext').textContent = 'Set a password to finish creating your account.';
}

async function submit(){
  const name = $('nameInput').value.trim();
  const pw = $('pwInput').value;
  const pw2 = $('pw2Input').value;
  const err = $('formErr');
  err.classList.add('hidden');
  if(pw.length < 8){ err.textContent = 'Password must be at least 8 characters.'; err.classList.remove('hidden'); return; }
  if(pw !== pw2){ err.textContent = 'Passwords do not match.'; err.classList.remove('hidden'); return; }
  const btn = $('submitBtn');
  btn.disabled = true; btn.textContent = '…';
  try{
    const r = await fetch('/api/auth/accept-invite', {
      method: 'POST', headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({token, password: pw, password_confirm: pw2, name: name || undefined}),
    });
    const j = await r.json();
    if(!j.ok){
      err.textContent = j.error === 'invalid_or_expired_invite'
        ? 'This invite link is invalid or has expired.'
        : (j.error || 'Something went wrong.');
      err.classList.remove('hidden');
      btn.disabled = false; btn.textContent = 'Set password & continue →';
      return;
    }
    window.location.href = '/';
  } catch(e){
    err.textContent = 'Network error — try again.';
    err.classList.remove('hidden');
    btn.disabled = false; btn.textContent = 'Set password & continue →';
  }
}
$('submitBtn')?.addEventListener('click', submit);
$('pw2Input')?.addEventListener('keydown', e => { if(e.key === 'Enter') submit(); });
</script>
</body>
</html>
